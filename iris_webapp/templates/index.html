<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            background: #f0f8ff;
            padding: 20px;
        }
        h1 { color: #6a0dad; text-align: center; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        label { font-weight: bold; color: #333; }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover { background: #8a2be2; }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #f3e5ff;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Iris Flower Predictor</h1>
    <div class="card">
        <label>Sepal Length (cm)</label>
        <input type="number" id="sl" placeholder="e.g. 5.1" step="0.1">

        <label>Sepal Width (cm)</label>
        <input type="number" id="sw" placeholder="e.g. 3.5" step="0.1">

        <label>Petal Length (cm)</label>
        <input type="number" id="pl" placeholder="e.g. 1.4" step="0.1">

        <label>Petal Width (cm)</label>
        <input type="number" id="pw" placeholder="e.g. 0.2" step="0.1">

        <button onclick="predict()">Predict Flower</button>
        <div id="result"></div>
    </div>

    <script>
        async function predict() {
            const data = {
                sepal_length: parseFloat(document.getElementById("sl").value),
                sepal_width:  parseFloat(document.getElementById("sw").value),
                petal_length: parseFloat(document.getElementById("pl").value),
                petal_width:  parseFloat(document.getElementById("pw").value)
            };
            const response = await fetch("/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            const div = document.getElementById("result");
            div.style.display = "block";
            div.innerHTML = result.flower + 
                           "<br><small>Confidence: " + 
                           result.confidence + "</small>";
        }
    </script>
</body>
</html>
